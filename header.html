<!-- [ Header Topbar ] start -->
<header class="pc-header">
  <div class="header-wrapper flex max-sm:px-[15px] px-[25px] grow">
    <div class="me-auto pc-mob-drp">
      <ul class="inline-flex *:min-h-header-height *:inline-flex *:items-center">
        <li class="pc-h-item pc-sidebar-collapse max-lg:hidden lg:inline-flex">
          <a href="#" class="pc-head-link" id="sidebar-hide">
            <i data-feather="menu"></i>
          </a>
        </li>
        <li class="pc-h-item pc-sidebar-popup lg:hidden">
          <a href="#" class="pc-head-link" id="mobile-collapse">
            <i data-feather="menu"></i>
          </a>
        </li>
      </ul>
    </div>

    <div class="ms-auto">
      <ul class="inline-flex *:min-h-header-height *:inline-flex *:items-center">
        <li class="dropdown pc-h-item header-user-profile">
          <a class="pc-head-link dropdown-toggle arrow-none me-0" data-pc-toggle="dropdown" href="#">
            <i data-feather="user" class="text-white"></i>
          </a>

          <div class="dropdown-menu dropdown-user-profile dropdown-menu-end pc-h-dropdown p-2 overflow-hidden">
            <div class="dropdown-header flex items-center py-4 px-5 bg-[#212E13]">
              <div class="flex items-center">
                <img src="../assets/images/user/avatar-2.jpg" class="w-10 rounded-full" />
                <div class="ms-4 bg-[#fefae0] py-2 px-5 rounded-md">
                  <h4 id="adminNameHeader" class="text-black font-bold">Admin</h4>
                </div>
              </div>
            </div>

            <div class="dropdown-body py-4 px-5 bg-[#212E13] border-t border-white">
              <button onclick="logout()" class="w-full bg-[#fefae0] hover:bg-[#ffdb7f] py-2 rounded text-black font-semibold">
                Log Out
              </button>
            </div>
          </div>
        </li>
      </ul>
    </div>
  </div>
</header>
<!-- [ Header ] end -->

<script>
  const adminName = sessionStorage.getItem('adminName');
  if (!sessionStorage.getItem('admin_logged_in')) {
    window.location.href = '../../index.html';
  }
  document.getElementById('adminNameHeader').textContent = adminName ?? 'Admin';
</script>
