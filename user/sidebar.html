<!-- Sidebar Toggle Script (pure JS) -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const sidebar   = document.getElementById('marketplaceSidebar');
  const toggleBtn = document.getElementById('sidebarToggle');
  let isOpen = true;

  const savedState = localStorage.getItem('sidebarOpen');
  if (savedState !== null) {
    isOpen = savedState === 'true';
    if (!isOpen) {
      sidebar.style.transform = 'translateX(-100%)';
    }
  }

  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      isOpen = !isOpen;
      sidebar.style.transform = isOpen ? 'translateX(0)' : 'translateX(-100%)';
      localStorage.setItem('sidebarOpen', String(isOpen));
      document.dispatchEvent(new CustomEvent('sidebarToggled', { detail: { isOpen } }));
    });

    toggleBtn.addEventListener('mouseenter', function() {
      this.style.background = '#3a3b3c';
    });
    toggleBtn.addEventListener('mouseleave', function() {
      this.style.background = '#242526';
    });
  }
});
</script>
