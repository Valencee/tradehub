<script>
// Sidebar toggle + saved state
document.addEventListener('DOMContentLoaded', function() {
  const toggleBtn = document.getElementById('sidebarToggle');
  const sidebar  = document.getElementById('marketplaceSidebar');
  let isOpen = true;

  const savedState = localStorage.getItem('sidebarOpen');
  if (savedState !== null) {
    isOpen = savedState === 'true';
    updateSidebarState();
  } else {
    document.body.classList.remove('sidebar-hidden');
  }

  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      isOpen = !isOpen;
      updateSidebarState();
      localStorage.setItem('sidebarOpen', String(isOpen));
    });
  }

  function updateSidebarState() {
    if (!sidebar || !toggleBtn) return;

    if (isOpen) {
      sidebar.style.transform = 'translateX(0)';
      toggleBtn.classList.remove('active');
      document.body.classList.remove('sidebar-hidden');
    } else {
      sidebar.style.transform = 'translateX(-100%)';
      toggleBtn.classList.add('active');
      document.body.classList.add('sidebar-hidden');
    }

    const event = new CustomEvent('sidebarToggled', {
      detail: { isOpen: isOpen },
      bubbles: true
    });
    document.dispatchEvent(event);
    window.dispatchEvent(event);
  }

  // 🔥 Load logged-in student info into dropdown
  const nameEl  = document.querySelector('.profile-user-name');
  const emailEl = document.querySelector('.profile-user-email');

  const studentName  = sessionStorage.getItem('studentName');
  const studentEmail = sessionStorage.getItem('studentEmail');

  if (studentName && nameEl)  nameEl.textContent  = studentName;
  if (studentEmail && emailEl) emailEl.textContent = studentEmail;
});

// Profile dropdown show/hide
function toggleProfileDropdown() {
  const dropdown = document.getElementById('profileDropdown');
  if (dropdown) dropdown.classList.toggle('show');
}

document.addEventListener('click', function(event) {
  const container = document.querySelector('.user-profile-container');
  const dropdown = document.getElementById('profileDropdown');
  if (container && dropdown && !container.contains(event.target)) {
    dropdown.classList.remove('show');
  }
});

document.getElementById('profileDropdown')?.addEventListener('click', function(event) {
  event.stopPropagation();
});

// 🔐 Sign out: clear session + go back to main login page
function handleSignOut() {
  if (confirm('Are you sure you want to sign out?')) {
    // clear any login flags/data from sessionStorage
    sessionStorage.removeItem('user_logged_in');
    sessionStorage.removeItem('studentName');
    sessionStorage.removeItem('studentEmail');
    sessionStorage.removeItem('course_block');
    sessionStorage.removeItem('studentNumber');
    sessionStorage.removeItem('studentID');

    // redirect to root index.html (login)
    window.location.href = '../../index.html';
  }
}

// Keyboard shortcuts: Ctrl/Cmd + B to toggle sidebar, Esc to close dropdown
document.addEventListener('keydown', function(event) {
  if ((event.ctrlKey || event.metaKey) && event.key === 'b') {
    event.preventDefault();
    const btn = document.getElementById('sidebarToggle');
    if (btn) btn.click();
  }

  if (event.key === 'Escape') {
    const dropdown = document.getElementById('profileDropdown');
    if (dropdown && dropdown.classList.contains('show')) {
      dropdown.classList.remove('show');
    }
  }
});
</script>
