  <script>
    window.addEventListener('load', function () {
      const container = document.querySelector('.notifications-container');
      const sidebar   = document.getElementById('marketplaceSidebar');

      function updateContainer() {
        if (!container) return;
        const sidebarOpen = localStorage.getItem('sidebarOpen');
        if (sidebarOpen === 'false') {
          document.body.classList.add('sidebar-closed', 'sidebar-hidden');
          container.style.marginLeft = '0';
          container.style.width = '100%';
        } else {
          document.body.classList.remove('sidebar-closed', 'sidebar-hidden');
          container.style.marginLeft = '360px';
          container.style.width = 'calc(100% - 360px)';
        }
      }

      updateContainer();
      document.addEventListener('sidebarToggled', () => setTimeout(updateContainer, 50));
      window.addEventListener('storage', updateContainer);

      const toggleBtn = document.getElementById('sidebarToggle');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => setTimeout(updateContainer, 50));
      }

      if (sidebar) {
        const observer = new MutationObserver(() => setTimeout(updateContainer, 50));
        observer.observe(sidebar, { attributes: true, attributeFilter: ['style'] });
      }
    });
  </script>

  <script>
    function initHeaderAndSidebar() {
      const sidebar   = document.getElementById('marketplaceSidebar');
      const toggleBtn = document.getElementById('sidebarToggle');
      let isOpen = true;

      const nameEl  = document.getElementById('profileUserName');
      const emailEl = document.getElementById('profileUserEmail');

      const storedName  = sessionStorage.getItem('studentName');
      const storedEmail = sessionStorage.getItem('studentEmail');

      if (nameEl && storedName)  nameEl.textContent  = storedName;
      if (emailEl && storedEmail) emailEl.textContent = storedEmail;

      const savedState = localStorage.getItem('sidebarOpen');
      if (savedState !== null) {
        isOpen = (savedState === 'true');
      }

      function updateSidebarState() {
        if (!sidebar || !toggleBtn) return;
        if (isOpen) {
          sidebar.style.transform = 'translateX(0)';
          toggleBtn.classList.remove('active');
          document.body.classList.remove('sidebar-hidden');
        } else {
          sidebar.style.transform = 'translateX(-100%)';
          toggleBtn.classList.add('active');
          document.body.classList.add('sidebar-hidden');
        }

        const event = new CustomEvent('sidebarToggled', {
          detail: { isOpen },
          bubbles: true
        });
        document.dispatchEvent(event);
        window.dispatchEvent(event);
      }

      updateSidebarState();

      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          isOpen = !isOpen;
          localStorage.setItem('sidebarOpen', String(isOpen));
          updateSidebarState();
        });
      }

      window.toggleProfileDropdown = function () {
        const dropdown = document.getElementById('profileDropdown');
        if (dropdown) dropdown.classList.toggle('show');
      };

      document.addEventListener('click', function (event) {
        const container = document.querySelector('.user-profile-container');
        const dropdown = document.getElementById('profileDropdown');
        if (container && dropdown && !container.contains(event.target)) {
          dropdown.classList.remove('show');
        }

        document.querySelectorAll('.notif-menu.show').forEach(menu => {
  if (!menu.parentElement.contains(event.target)) {
    menu.classList.remove('show');
  }
});

document.querySelectorAll('.notification-item.menu-open').forEach(card => {
  const wrap = card.querySelector('.notif-menu-wrap');
  if (wrap && !wrap.contains(event.target)) {
    card.classList.remove('menu-open');
  }
});
      });

      const pd = document.getElementById('profileDropdown');
      if (pd) {
        pd.addEventListener('click', function (event) {
          event.stopPropagation();
        });
      }

      window.handleSignOut = function () {
  Swal.fire({
    title: 'Sign out?',
    text: 'Are you sure you want to sign out of your account?',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Yes, sign out',
    cancelButtonText: 'Cancel',
    reverseButtons: true,
    allowOutsideClick: true,
    allowEscapeKey: true,
    backdrop: 'rgba(0,0,0,0.45)',
    customClass: {
      popup: 'logout-swal-popup',
      title: 'logout-swal-title',
      htmlContainer: 'logout-swal-text',
      confirmButton: 'logout-swal-confirm',
      cancelButton: 'logout-swal-cancel'
    },
    buttonsStyling: false
  }).then((result) => {
    if (result.isConfirmed) {
      sessionStorage.clear();

      Swal.fire({
        title: 'Signed out',
        text: 'You have been successfully signed out.',
        icon: 'success',
        timer: 1200,
        showConfirmButton: false,
        backdrop: 'rgba(0,0,0,0.45)',
        customClass: {
          popup: 'logout-swal-popup',
          title: 'logout-swal-title',
          htmlContainer: 'logout-swal-text'
        }
      }).then(() => {
        window.location.href = '../../index.html';
      });
    }
  });
};

      document.addEventListener('keydown', function (event) {
        if ((event.ctrlKey || event.metaKey) && event.key === 'b') {
          event.preventDefault();
          if (toggleBtn) toggleBtn.click();
        }
        if (event.key === 'Escape') {
          const dropdown = document.getElementById('profileDropdown');
          if (dropdown && dropdown.classList.contains('show')) {
            dropdown.classList.remove('show');
          }
          document.querySelectorAll('.notif-menu.show').forEach(menu => menu.classList.remove('show'));
        }
      });
    }

    document.addEventListener('DOMContentLoaded', initHeaderAndSidebar);
  </script>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabaseUrl = 'https://ggzywautymbydgyaeoyf.supabase.co';
    const supabaseKey = 'sb_publishable_RRqftVnS5kBVcTKGAtQdag_JtM0LCn4';
    const supabase    = createClient(supabaseUrl, supabaseKey);

     const currentStudentNumber = sessionStorage.getItem('studentNumber') || '';
    const messagesUnreadBadge = document.getElementById('messagesUnreadBadge');

    let currentNotifications = [];
    let unreadBadgeChannel = null;

    function renderSidebarUnread(total) {
    if (!messagesUnreadBadge) return;

    const unreadTotal = Number(total || 0);

    if (unreadTotal > 0) {
      messagesUnreadBadge.style.display = 'inline-flex';
      messagesUnreadBadge.textContent = unreadTotal > 99 ? '99+' : String(unreadTotal);
    } else {
      messagesUnreadBadge.style.display = 'none';
      messagesUnreadBadge.textContent = '0';
    }
  }

  async function loadUnreadBadgeCount() {
    if (!currentStudentNumber) {
      renderSidebarUnread(0);
      return;
    }

    const { data: participantRows, error: participantError } = await supabase
      .from('chat_participants')
      .select('thread_id')
      .eq('student_number', currentStudentNumber)
      .is('deleted_at', null);

    if (participantError) {
      console.error('Error loading participant threads:', participantError);
      renderSidebarUnread(0);
      return;
    }

    const threadIds = [...new Set((participantRows || []).map(row => row.thread_id))];

    if (!threadIds.length) {
      renderSidebarUnread(0);
      return;
    }

    const { data: unreadRows, error: unreadError } = await supabase
      .from('chat_messages')
      .select('id, thread_id')
      .in('thread_id', threadIds)
      .neq('sender_student_number', currentStudentNumber)
      .eq('is_read', false);

    if (unreadError) {
      console.error('Error loading unread messages:', unreadError);
      renderSidebarUnread(0);
      return;
    }

    renderSidebarUnread((unreadRows || []).length);
  }

  function subscribeToUnreadBadge() {
    if (!currentStudentNumber) return;

    if (unreadBadgeChannel) {
      supabase.removeChannel(unreadBadgeChannel);
      unreadBadgeChannel = null;
    }

    unreadBadgeChannel = supabase
      .channel(`browse-unread-badge-${currentStudentNumber}`)
      .on(
        'postgres_changes',
        {
          event: 'INSERT',
          schema: 'public',
          table: 'chat_messages'
        },
        async () => {
          await loadUnreadBadgeCount();
        }
      )
      .on(
        'postgres_changes',
        {
          event: 'UPDATE',
          schema: 'public',
          table: 'chat_messages'
        },
        async () => {
          await loadUnreadBadgeCount();
        }
      )
      .on(
        'postgres_changes',
        {
          event: '*',
          schema: 'public',
          table: 'chat_participants'
        },
        async () => {
          await loadUnreadBadgeCount();
        }
      )
      .subscribe((status) => {
        console.log('Browse unread badge realtime:', status);
      });
  }

  window.addEventListener('load', async () => {
    await loadUnreadBadgeCount();
    subscribeToUnreadBadge();
  });

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatTimeAgo(dateInput) {
      if (!dateInput) return '';
      const d = new Date(dateInput);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const diffMs = now - d;
      const diffMin = Math.floor(diffMs / (1000 * 60));
      const diffHr  = Math.floor(diffMs / (1000 * 60 * 60));
      const diffDay = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      if (diffMin < 1) return 'Just now';
      if (diffMin < 60) return diffMin + (diffMin === 1 ? ' min ago' : ' mins ago');
      if (diffHr  < 24) return diffHr  + (diffHr  === 1 ? ' hr ago'  : ' hrs ago');
      if (diffDay < 30) return diffDay + (diffDay === 1 ? ' day ago' : ' days ago');
      return d.toLocaleDateString();
    }

    function isMine(row, myStudNo) {
      return String(row.recipient_student_number ?? '') === String(myStudNo ?? '');
    }

    async function loadNotifications() {
      const myStudNo = sessionStorage.getItem('studentNumber');

      if (!myStudNo) {
        console.warn('[NOTIF] Walang studentNumber sa sessionStorage.');
        return [];
      }

      const { data, error } = await supabase
        .from('notifications')
        .select('*')
        .eq('recipient_student_number', myStudNo)
        .order('created_at', { ascending: false });

      if (error) {
        console.error('[NOTIF] Error loading notifications:', error);
        alert('Error loading notifications. Check console for details.');
        return [];
      }

      const myRows = (data || []).filter(row => isMine(row, myStudNo));

      return myRows.map(row => {
        let filterType = 'other';
        let title      = 'Notification';
        let text       = row.message || '';
        let iconEmoji  = '';
        let iconClass  = '';

        if (row.type === 'listing_status') {
          filterType = 'listing_status';

          const listingTitle = row.listing_title || 'your listing';
          const msgLower = String(row.message || '').toLowerCase();

          const finalStatus =
            (msgLower.includes('approved') ? 'approved' :
            (msgLower.includes('rejected') ? 'rejected' : 'pending'));

          if (finalStatus === 'approved') {
            title = 'Listing approved';
            text  = row.message || `Your listing "${listingTitle}" has been approved by the admin.`;
            iconEmoji = '';
            iconClass = '';
          } else if (finalStatus === 'rejected') {
            title = 'Listing rejected';
            text  = row.message || `Your listing "${listingTitle}" has been rejected by the admin.`;
            iconEmoji = '';
            iconClass = '';
          } else {
            title = 'Listing sent for approval';
            text  = row.message || `Your request listing "${listingTitle}" has been sent to admin for approval.`;
            iconEmoji = '';
            iconClass = '';
          }
        }
        else if (row.type === 'bookmark') {
          filterType = 'bookmarks';
          title      = 'Item bookmarked';
          const who  = row.actor_name || 'Someone';
          const listingTitle = row.listing_title || 'your listing';
          text = row.message || `${who} bookmarked your listing "${listingTitle}".`;
          iconEmoji = '';
          iconClass = '';
        }
        else if (row.type === 'listing_report') {
          filterType = 'listing_reports';
          title      = 'Listing reported';
          const listingTitle = row.listing_title || 'one of your listings';
          text = row.message || `A report was submitted for your listing "${listingTitle}".`;
          iconEmoji = '';
          iconClass = '';
        }
        else if (row.type === 'profile_report') {
          filterType = 'profile_reports';
          title      = 'Profile reported';
          text = row.message || 'A report was submitted about your profile.';
          iconEmoji = '';
          iconClass = '';
        }

        return {
          id: String(row.id),
          type: row.type,
          filterType,
          title,
          text,
          iconEmoji,
          iconClass,
          isRead: !!row.is_read,
          timeLabel: formatTimeAgo(row.created_at),
          rawDate: row.created_at ? new Date(row.created_at) : new Date(0)
        };
      });
    }

    function createNotificationItem(n) {
      const item = document.createElement('div');
      item.className = `notification-item ${n.isRead ? 'read' : 'unread'}`;
      item.dataset.type = n.filterType;
      item.dataset.id   = n.id;
      item.dataset.read = n.isRead ? 'true' : 'false';

      item.innerHTML = `
        <div class="notification-icon ${n.iconClass}">${n.iconEmoji}</div>

        <div class="notification-content">
          <div class="notification-title">${escapeHtml(n.title)}</div>
          <div class="notification-text">${escapeHtml(n.text)}</div>
          <div class="notification-time">${escapeHtml(n.timeLabel || '')}</div>
        </div>

        <div class="notif-menu-wrap">
          <button class="notif-menu-btn" type="button" title="More options">⋯</button>
          <div class="notif-menu">
            <button class="notif-menu-item" data-menu-action="mark-all-read"> Mark all as read</button>
            <button class="notif-menu-item danger" data-menu-action="delete-one"> Delete</button>
          </div>
        </div>

        <div class="unread-dot"></div>
      `;

      const menuBtn = item.querySelector('.notif-menu-btn');
      const menu = item.querySelector('.notif-menu');

      menuBtn.addEventListener('click', (e) => {
  e.stopPropagation();

  document.querySelectorAll('.notif-menu.show').forEach(m => {
    if (m !== menu) m.classList.remove('show');
  });

  document.querySelectorAll('.notification-item.menu-open').forEach(card => {
    if (card !== item) card.classList.remove('menu-open');
  });

  const willOpen = !menu.classList.contains('show');
  menu.classList.toggle('show', willOpen);
  item.classList.toggle('menu-open', willOpen);
});

      menu.querySelector('[data-menu-action="mark-all-read"]').addEventListener('click', async (e) => {
        e.stopPropagation();
        menu.classList.remove('show');
        await markAllAsRead();
      });

      menu.querySelector('[data-menu-action="delete-one"]').addEventListener('click', async (e) => {
        e.stopPropagation();
        menu.classList.remove('show');
        await deleteSingleNotification(n.id);
      });

      item.addEventListener('click', async () => {
        if (item.dataset.read === 'false') {
          await markNotificationAsRead(n.id, item);
        }
      });

      return item;
    }

    function renderNotifications(list) {
      const container = document.getElementById('notificationsList');
      const emptyText = document.getElementById('noNotificationsText');
      container.innerHTML = '';

      if (!list.length) {
        emptyText.style.display = 'block';
        return;
      }
      emptyText.style.display = 'none';

      list.forEach(n => container.appendChild(createNotificationItem(n)));
    }

    async function markNotificationAsRead(id, itemEl = null) {
      try {
        const { error } = await supabase
          .from('notifications')
          .update({ is_read: true })
          .eq('id', id);

        if (error) {
          console.error('[NOTIF] Error marking as read:', error);
          return;
        }

        if (itemEl) {
          itemEl.dataset.read = 'true';
          itemEl.classList.remove('unread');
          itemEl.classList.add('read');
        }

        currentNotifications = currentNotifications.map(n =>
          n.id === String(id) ? { ...n, isRead: true } : n
        );
      } catch (err) {
        console.error('[NOTIF] Unexpected error marking as read:', err);
      }
    }

    async function markAllAsRead() {
      const myStudNo = sessionStorage.getItem('studentNumber');
      if (!myStudNo) return;

      const unreadIds = currentNotifications
        .filter(n => !n.isRead)
        .map(n => n.id);

      if (!unreadIds.length) return;

      try {
        const { error } = await supabase
          .from('notifications')
          .update({ is_read: true })
          .eq('recipient_student_number', myStudNo)
          .eq('is_read', false);

        if (error) {
          console.error('[NOTIF] Error marking all as read:', error);
          return;
        }

        currentNotifications = currentNotifications.map(n => ({ ...n, isRead: true }));

        document.querySelectorAll('.notification-item').forEach(item => {
          item.dataset.read = 'true';
          item.classList.remove('unread');
          item.classList.add('read');
        });
      } catch (err) {
        console.error('[NOTIF] Unexpected error marking all as read:', err);
      }
    }

    async function deleteSingleNotification(id) {
      const item = document.querySelector(`.notification-item[data-id="${CSS.escape(String(id))}"]`);
      if (!item) return;

      try {
        const { error } = await supabase
          .from('notifications')
          .delete()
          .eq('id', id);

        if (error) {
          console.error('[NOTIF] Error deleting notification:', error);
          return;
        }
      } catch (err) {
        console.error('[NOTIF] Unexpected error deleting notification:', err);
        return;
      }

      item.style.opacity = '0';
      item.style.transform = 'translateX(100px)';
      item.style.transition = 'all 0.3s';

      setTimeout(() => {
        item.remove();
        currentNotifications = currentNotifications.filter(n => n.id !== String(id));
        refreshEmptyState();
      }, 300);
    }

   async function deleteAllNotifications() {
  const myStudNo = sessionStorage.getItem('studentNumber');
  if (!myStudNo) return;

  const hasAny = currentNotifications.length > 0;
  if (!hasAny) {
    await Swal.fire({
      title: 'No notifications',
      text: 'There are no notifications to delete.',
      icon: 'info',
      allowOutsideClick: true,
      allowEscapeKey: true,
      backdrop: 'rgba(0,0,0,0.45)',
      customClass: {
        popup: 'logout-swal-popup',
        title: 'logout-swal-title',
        htmlContainer: 'logout-swal-text',
        confirmButton: 'logout-swal-confirm'
      },
      buttonsStyling: false
    });
    return;
  }

  const result = await Swal.fire({
    title: 'Delete all notifications?',
    text: 'This will permanently remove all your notifications.',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonText: 'Yes, delete all',
    cancelButtonText: 'Cancel',
    reverseButtons: true,
    allowOutsideClick: true,
    allowEscapeKey: true,
    backdrop: 'rgba(0,0,0,0.45)',
    customClass: {
      popup: 'logout-swal-popup',
      title: 'logout-swal-title',
      htmlContainer: 'logout-swal-text',
      confirmButton: 'danger-swal-confirm',
      cancelButton: 'logout-swal-cancel'
    },
    buttonsStyling: false
  });

  if (!result.isConfirmed) return;

  try {
    const { error } = await supabase
      .from('notifications')
      .delete()
      .eq('recipient_student_number', myStudNo);

    if (error) {
      console.error('[NOTIF] Error deleting all notifications:', error);

      await Swal.fire({
        title: 'Delete failed',
        text: 'Could not delete all notifications. Please try again.',
        icon: 'error',
        allowOutsideClick: true,
        allowEscapeKey: true,
        backdrop: 'rgba(0,0,0,0.45)',
        customClass: {
          popup: 'logout-swal-popup',
          title: 'logout-swal-title',
          htmlContainer: 'logout-swal-text',
          confirmButton: 'danger-swal-confirm'
        },
        buttonsStyling: false
      });
      return;
    }

    currentNotifications = [];
    document.getElementById('notificationsList').innerHTML = '';
    refreshEmptyState();

    await Swal.fire({
      title: 'Deleted',
      text: 'All notifications have been deleted.',
      icon: 'success',
      timer: 1300,
      showConfirmButton: false,
      allowOutsideClick: true,
      allowEscapeKey: true,
      backdrop: 'rgba(0,0,0,0.45)',
      customClass: {
        popup: 'logout-swal-popup',
        title: 'logout-swal-title',
        htmlContainer: 'logout-swal-text'
      }
    });
  } catch (err) {
    console.error('[NOTIF] Unexpected error deleting all notifications:', err);

    await Swal.fire({
      title: 'Unexpected error',
      text: 'Something went wrong while deleting notifications.',
      icon: 'error',
      allowOutsideClick: true,
      allowEscapeKey: true,
      backdrop: 'rgba(0,0,0,0.45)',
      customClass: {
        popup: 'logout-swal-popup',
        title: 'logout-swal-title',
        htmlContainer: 'logout-swal-text',
        confirmButton: 'danger-swal-confirm'
      },
      buttonsStyling: false
    });
  }
}

    function refreshEmptyState() {
      const items = Array.from(document.querySelectorAll('.notification-item'))
        .filter(i => i.style.display !== 'none');
      const emptyText = document.getElementById('noNotificationsText');
      emptyText.style.display = items.length ? 'none' : 'block';
    }

    function filterNotifications(type, btn) {
      const buttons = document.querySelectorAll('.filter-btn');
      buttons.forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      const items = document.querySelectorAll('.notification-item');
      items.forEach(item => {
        const itemType = item.dataset.type;
        item.style.display = (type === 'all' || itemType === type) ? 'flex' : 'none';
      });

      refreshEmptyState();
    }

    async function initNotifications() {
      currentNotifications = await loadNotifications();
      currentNotifications.sort((a, b) => b.rawDate - a.rawDate);
      renderNotifications(currentNotifications);

      const markAllBtn = document.getElementById('markAllReadBtn');
      const deleteAllBtn = document.getElementById('deleteAllBtn');

      if (markAllBtn) {
        markAllBtn.addEventListener('click', markAllAsRead);
      }

      if (deleteAllBtn) {
        deleteAllBtn.addEventListener('click', deleteAllNotifications);
      }
    }

    window.filterNotifications = filterNotifications;

    window.addEventListener('load', initNotifications);
  </script>
