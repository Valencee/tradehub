<!doctype html>
<html lang="en" data-pc-preset="preset-1" data-pc-sidebar-caption="true" data-pc-direction="ltr" dir="ltr" data-pc-theme="light">
  <head>
    <title>Forgot Password - PHINMA TradeHub</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimal-ui" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="PHINMA TradeHub Forgot Password" />
    <meta name="keywords" content="PHINMA, TradeHub, Forgot Password" />
    <meta name="author" content="Sniper 2025" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./dist/assets/fonts/phosphor/duotone/style.css" />
    <link rel="stylesheet" href="./dist/assets/fonts/tabler-icons.min.css" />
    <link rel="stylesheet" href="./dist/assets/fonts/feather.css" />
    <link rel="stylesheet" href="./dist/assets/fonts/fontawesome.css" />
    <link rel="stylesheet" href="./dist/assets/fonts/material.css" />
    <link rel="stylesheet" href="./dist/assets/css/style.css" id="main-style-link" />
    <link rel="stylesheet" href="./dist/assets/css/login.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
  .forgot-wrapper {
    margin-top: 220px; /* from 180px */
  }

  .message-box {
    min-height: 44px;
    opacity: 0;
    pointer-events: none;
  }

  .message-box.show {
    opacity: 1;
  }

  @media (max-width: 768px) {
    .forgot-wrapper {
      margin-top: 100px; /* from 80px */
    }
  }
</style>
  </head>

  <body class="login-page" style="background-image: url('./dist/assets/images/bg.png'); background-size: cover; background-position: center; background-attachment: fixed;">
    <div class="header">
      <div class="logo">
        <img src="./dist/assets/images/upang_logo.png" alt="University Logo">
      </div>
      <h6>PHINMA TradeHub</h6>
    </div>

    <div class="forgot-wrapper flex justify-center items-start min-h-screen pb-10 px-4">
      <div class="bg-gray-100 rounded-3xl px-6 md:px-20 py-10 shadow-lg flex items-center justify-center w-full max-w-2xl">
        <div class="w-full max-w-md">
          <div class="space-y-4 text-center">
            <div class="inline-block">
              <h1 class="text-3xl font-bold text-green-900 border-b-2 border-black pb-2">Forgot Password</h1>
            </div>

            <div
              id="messageBox"
              class="message-box flex items-center justify-center text-center font-bold rounded px-3 transition-opacity duration-200"
            ></div>

            <!-- SEND RESET LINK SECTION -->
            <form id="requestForm" class="space-y-4" novalidate>
              <div id="requestSection" class="space-y-4">
                <div class="text-left">
                  <div class="bg-white flex items-center rounded-2xl px-4 py-3 gap-3">
                    <i class="bi bi-envelope-fill text-black"></i>
                    <input
                      type="email"
                      id="email"
                      placeholder="Enter your PHINMA email"
                      class="w-full focus:outline-none bg-transparent"
                      required
                      autocomplete="email"
                    >
                  </div>
                  <p id="emailError" class="text-red-600 text-sm font-semibold mt-1 hidden"></p>
                </div>

                <div class="text-center">
                  <button
                    type="submit"
                    id="sendLinkBtn"
                    class="up-green text-white py-2 px-16 rounded font-medium transition hover:opacity-90"
                  >
                    Send Reset Link
                  </button>
                </div>
              </div>
            </form>

            <!-- RESET PASSWORD SECTION -->
            <form id="resetForm" class="space-y-4 hidden" novalidate>
              <div class="text-left">
                <div class="bg-white flex items-center rounded-2xl px-4 py-3 gap-3">
                  <i class="bi bi-key-fill text-black"></i>
                  <input
                    type="password"
                    id="newPassword"
                    placeholder="New Password"
                    class="w-full focus:outline-none"
                    autocomplete="new-password"
                  >
                </div>
                <p id="passwordError" class="text-red-600 text-sm font-semibold mt-1 hidden"></p>
              </div>

              <div class="text-left">
                <div class="bg-white flex items-center rounded-2xl px-4 py-3 gap-3">
                  <i class="bi bi-key-fill text-black"></i>
                  <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm New Password"
                    class="w-full focus:outline-none"
                    autocomplete="new-password"
                  >
                </div>
                <p id="confirmPasswordError" class="text-red-600 text-sm font-semibold mt-1 hidden"></p>
              </div>

              <div class="text-center">
                <button
                  type="submit"
                  id="resetBtn"
                  class="up-green text-white py-2 px-16 rounded font-medium transition hover:opacity-90"
                >
                  Update Password
                </button>
              </div>
            </form>

            <div class="text-center mt-4">
              <a href="index.html" class="text-green-800 font-semibold hover:underline">Back to Sign-in</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

      const supabase = createClient(
        'https://ggzywautymbydgyaeoyf.supabase.co',
        'sb_publishable_RRqftVnS5kBVcTKGAtQdag_JtM0LCn4'
      );

      const requestForm = document.getElementById('requestForm');
      const resetForm = document.getElementById('resetForm');
      const requestSection = document.getElementById('requestSection');

      const emailInput = document.getElementById('email');
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      const sendLinkBtn = document.getElementById('sendLinkBtn');
      const resetBtn = document.getElementById('resetBtn');
      const messageBox = document.getElementById('messageBox');

      function showMessage(message, isError = true) {
        messageBox.textContent = message;
        messageBox.className =
          'message-box show flex items-center justify-center text-center font-bold rounded px-3 transition-opacity duration-200 ' +
          (isError ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600');

        clearTimeout(showMessage._timer);
        showMessage._timer = setTimeout(() => {
          messageBox.classList.remove('show');
        }, 5000);
      }

      function showFieldError(id, message) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = message;
        el.classList.remove('hidden');
      }

      function clearFieldError(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = '';
        el.classList.add('hidden');
      }

      function clearAllErrors() {
        clearFieldError('emailError');
        clearFieldError('passwordError');
        clearFieldError('confirmPasswordError');
      }

      function isValidPhinmaEmail(email) {
        return email.trim().toLowerCase().endsWith('.up@phinmaed.com');
      }

      function isStrongPassword(password) {
        if (password.includes(' ')) return false;
        if (password.length < 8) return false;

        const hasUpper = /[A-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasSymbol = /[^A-Za-z0-9]/.test(password);

        return hasUpper && hasNumber && hasSymbol;
      }

      function showResetForm() {
        requestForm.classList.add('hidden');
        resetForm.classList.remove('hidden');
        showMessage('You can now set your new password.', false);
      }

      emailInput.addEventListener('input', () => {
        const value = emailInput.value.trim();

        if (!value) {
          clearFieldError('emailError');
          return;
        }

        if (!isValidPhinmaEmail(value)) {
          showFieldError('emailError', 'Use your PHINMA email only.');
        } else {
          clearFieldError('emailError');
        }
      });

      newPasswordInput.addEventListener('input', () => {
        const value = newPasswordInput.value;

        if (!value) {
          clearFieldError('passwordError');
        } else if (!isStrongPassword(value)) {
          showFieldError('passwordError', 'Min 8 chars, 1 uppercase, 1 number, 1 symbol, no spaces.');
        } else {
          clearFieldError('passwordError');
        }

        if (confirmPasswordInput.value) {
          if (confirmPasswordInput.value !== value) {
            showFieldError('confirmPasswordError', 'Passwords do not match.');
          } else {
            clearFieldError('confirmPasswordError');
          }
        }
      });

      confirmPasswordInput.addEventListener('input', () => {
        if (!confirmPasswordInput.value) {
          clearFieldError('confirmPasswordError');
          return;
        }

        if (confirmPasswordInput.value !== newPasswordInput.value) {
          showFieldError('confirmPasswordError', 'Passwords do not match.');
        } else {
          clearFieldError('confirmPasswordError');
        }
      });

      // Detect password recovery session from email link
      supabase.auth.onAuthStateChange(async (event) => {
        if (event === 'PASSWORD_RECOVERY') {
          showResetForm();
        }
      });

      // Also check if a recovery session already exists after redirect
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const hash = window.location.hash || '';
        const search = window.location.search || '';
        if (
          hash.includes('type=recovery') ||
          search.includes('type=recovery') ||
          hash.includes('access_token=')
        ) {
          showResetForm();
        }
      }

      requestForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAllErrors();

        const email = emailInput.value.trim().toLowerCase();

        if (!email) {
          showFieldError('emailError', 'Please enter your PHINMA email.');
          showMessage('Please enter your PHINMA email.');
          return;
        }

        if (!isValidPhinmaEmail(email)) {
          showFieldError('emailError', 'Use your PHINMA email only.');
          showMessage('Please correct the email.');
          return;
        }

        sendLinkBtn.disabled = true;
        sendLinkBtn.textContent = 'Sending...';

        try {
          const { error } = await supabase.auth.resetPasswordForEmail(email, {
            redirectTo: `${window.location.origin}${window.location.pathname}`
          });

          if (error) {
            console.error('Send reset link error:', error);
            showMessage(error.message || 'Failed to send reset link.');
            return;
          }

          showMessage('Password reset link sent to your PHINMA email.', false);
          requestSection.classList.add('opacity-70');
        } catch (err) {
          console.error('Unexpected send reset link error:', err);
          showMessage('An unexpected error occurred.');
        } finally {
          sendLinkBtn.disabled = false;
          sendLinkBtn.textContent = 'Send Reset Link';
        }
      });

      resetForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAllErrors();

        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (!newPassword || !confirmPassword) {
          showMessage('Please complete all fields.');
          if (!newPassword) showFieldError('passwordError', 'Please enter a new password.');
          if (!confirmPassword) showFieldError('confirmPasswordError', 'Please confirm your password.');
          return;
        }

        if (!isStrongPassword(newPassword)) {
          showFieldError('passwordError', 'Min 8 chars, 1 uppercase, 1 number, 1 symbol, no spaces.');
          showMessage('Please correct the password.');
          return;
        }

        if (newPassword !== confirmPassword) {
          showFieldError('confirmPasswordError', 'Passwords do not match.');
          showMessage('Passwords do not match.');
          return;
        }

        resetBtn.disabled = true;
        resetBtn.textContent = 'Updating...';

        try {
          const { error } = await supabase.auth.updateUser({
            password: newPassword
          });

          if (error) {
            console.error('Update password error:', error);
            showMessage(error.message || 'Failed to update password.');
            return;
          }

          showMessage('Password updated successfully! Redirecting to sign-in...', false);

          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } catch (err) {
          console.error('Unexpected update password error:', err);
          showMessage('An unexpected error occurred.');
        } finally {
          resetBtn.disabled = false;
          resetBtn.textContent = 'Update Password';
        }
      });
    </script>
  </body>
</html>
